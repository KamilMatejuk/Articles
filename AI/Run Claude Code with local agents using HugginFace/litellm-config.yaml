model_list:
  - model_name: GPT-OSS
    litellm_params:
      model: anthropic/GPT-OSS-Q8
      api_base: http://llama.cpp:11434

  # fallback for default Claude Code model
  - model_name: claude-haiku-4-5-20251001
    litellm_params:
      model: anthropic/GPT-OSS-Q8
      api_base: http://llama.cpp:11434

general_settings:
  store_model_in_db: true
  store_prompts_in_spend_logs: true

litellm_settings:
  master_key: os.environ.LITELLM_MASTER_KEY
  proxy_mode: true
  parse_tool_call_from_content: true
  drop_params: true
  drop_unsupported_params: true
  telemetry: true
  log_requests: true
  streaming: true

anthropic_proxy:
  enabled: true
  prefix: /
  responses_api: true
