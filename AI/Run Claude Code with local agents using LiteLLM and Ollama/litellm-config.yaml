model_list:
  - model_name: Qwen3.5
    litellm_params:
      model: ollama_chat/qwen3.5:9b
      api_base: http://ollama:11434
      extra_body:
        options:
          num_ctx: 32768
  
  - model_name: Qwen3
    litellm_params:
      model: ollama_chat/qwen3:8b
      api_base: http://ollama:11434
      extra_body:
        options:
          num_ctx: 32768

  - model_name: GPT-OSS
    litellm_params:
      model: ollama_chat/gpt-oss:20b
      api_base: http://ollama:11434
      extra_body:
        options:
          num_ctx: 32768

general_settings:
  store_model_in_db: true
  store_prompts_in_spend_logs: true

litellm_settings:
  master_key: os.environ.LITELLM_MASTER_KEY
  proxy_mode: true
  parse_tool_call_from_content: true
  drop_params: true
  drop_unsupported_params: true
  telemetry: true
  log_requests: true

anthropic_proxy:
  enabled: true
  prefix: /
  responses_api: true
