services:

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ./models:/models
      - ./ollama.sh:/entrypoint.sh
    environment:
      - MODELS=qwen3:8b,qwen3.5:9b,gpt-oss:20b
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_MODELS=/models
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    runtime: nvidia

  litellm:
    image: ghcr.io/berriai/litellm:v1.81.14-stable
    restart: unless-stopped
    ports:
      - "44000:4000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://litellm:litellm@postgres:5432/litellm
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: 
      - --config
      - /app/config.yaml
    depends_on:
      - ollama
      - postgres
    
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    volumes:
      - litellm_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  litellm_pg:
